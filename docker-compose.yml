services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: interview_coach
      POSTGRES_USER: interview_coach
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-interview_coach}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interview_coach -d interview_coach"]
      interval: 5s
      retries: 10

  llama:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: interview_coach_llama
    # Bind-mount the host's models dir; override with MODELS_DIR if it lives elsewhere.
    volumes:
      - ${MODELS_DIR:-${HOME}/models}:/models:ro
    command:
      - "-m"
      - "/models/${MODEL_FILE:-Qwen3-8B-IQ4_XS.gguf}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--n-gpu-layers"
      - "99"
      - "--ctx-size"
      - "8192"
      - "--jinja"
      - "--alias"
      - "${MODEL_NAME:-qwen3-8b}"
    ports:
      - "8080:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://interview_coach:${POSTGRES_PASSWORD:-interview_coach}@db:5432/interview_coach
      # Talk to the llama service over the docker network (NOT host.docker.internal).
      LLM_BASE_URL: http://llama:8080/v1
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GRAPH_DB_PATH: /data/graph_checkpoints.sqlite
      # Phase 11 — Langfuse tracing. Empty when not configured;
      # observability code is a no-op in that case.
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
    volumes:
      - graph_data:/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      # api startup doesn't call the LLM, so service_started is enough.
      # The model load takes ~30s+ on cold start; the first agent invocation
      # may need to wait. Tenacity retries on transient connect errors.
      llama:
        condition: service_started
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status == 200 else 1)"
      interval: 5s
      retries: 10

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

  # Adminer — lightweight DB browser for dev. Loopback-only bind:
  # nobody on the LAN gets a Postgres login form. Login with
  # System=PostgreSQL, Server=db, User=interview_coach,
  # Password=$POSTGRES_PASSWORD, Database=interview_coach.
  adminer:
    image: adminer:5
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "127.0.0.1:8090:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
  graph_data:
