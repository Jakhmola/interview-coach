services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: interview_coach
      POSTGRES_USER: interview_coach
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-interview_coach}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interview_coach -d interview_coach"]
      interval: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://interview_coach:${POSTGRES_PASSWORD:-interview_coach}@db:5432/interview_coach
      LLM_BASE_URL: http://host.docker.internal:8080/v1
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status == 200 else 1)"
      interval: 5s
      retries: 10

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pg_data:
